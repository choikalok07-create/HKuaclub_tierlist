        let currentFilter = "all";

        function createFilterButtons() {
            const container = document.getElementById('filter-buttons');
            container.innerHTML = `
                <button onclick="filterTiers('all')" 
                        class="filter-btn active bg-red-600 text-white border border-red-600 flex items-center justify-center">
                    全部
                </button>
            `;

            tiersData.forEach(tier => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn border border-gray-300 hover:border-red-400 flex items-center justify-center';
                btn.textContent = tier.name;
                btn.onclick = () => filterTiers(tier.id);
                container.appendChild(btn);
            });
        }

        function filterTiers(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = (filter === 'all' && btn.textContent === '全部') || btn.textContent === filter;
                if (isActive) {
                    btn.classList.add('active', 'bg-red-600', 'text-white', 'border-red-600');
                } else {
                    btn.classList.remove('active', 'bg-red-600', 'text-white', 'border-red-600');
                }
            });
            renderTiers();
        }

        function createTier(tier) {
            const div = document.createElement('div');
            div.className = 'rounded-3xl overflow-hidden border border-gray-100 bg-white shadow-xl';
            
            let cardsHTML = '';
            const images = tier.images || Array(8).fill({ src: "https://picsum.photos/id/201/180/240", alt: `${tier.name} placeholder card image` });
            images.forEach(img => {
                const src = typeof img === 'string' ? img : img.src;
                const alt = typeof img === 'string' ? `${tier.name} card image` : img.alt;
                cardsHTML += `<div class="flex justify-center"><img src="${src}" alt="${alt}" class="character-img"></div>`;
            });

            div.innerHTML = `
                <div class="bg-gradient-to-r ${tier.color} px-8 py-6 text-white">
                    <div class="flex items-center gap-6">
                        <div class="text-5xl font-black">${tier.name}</div>
                        <p class="text-2xl">${tier.desc}</p>
                    </div>
                </div>
                <div class="p-8">
                    <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-7 xl:grid-cols-8 gap-4">
                        ${cardsHTML}
                    </div>
                    <div class="mt-8 bg-gray-50 border border-gray-100 rounded-2xl p-6 text-gray-700">
                        <strong class="text-red-600">強度分析：</strong> ${tier.analysis}
                    </div>
                </div>
            `;
            return div;
        }

        function renderTiers() {
            const container = document.getElementById('tiers');
            container.innerHTML = '';
            const filteredTiers = currentFilter === 'all' ? tiersData : tiersData.filter(t => t.id === currentFilter);
            filteredTiers.forEach(tier => container.appendChild(createTier(tier)));
        }

        window.onload = () => {
            createFilterButtons();
            renderTiers();
            document.getElementById('update-date').textContent = 
                new Date().toLocaleDateString('zh-HK', { year: 'numeric', month: '2-digit', day: '2-digit' });
        };
    </script>
</body>
</html>
